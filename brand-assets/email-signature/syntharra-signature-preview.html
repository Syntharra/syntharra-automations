<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 30px; }

  .label {
    font-size: 10px;
    font-weight: bold;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #888;
    margin-bottom: 10px;
  }

  .box {
    padding: 28px;
    border-radius: 8px;
    margin-bottom: 24px;
    display: inline-block;
    min-width: 420px;
  }
  .light { background: #ffffff; border: 1px solid #ddd; }
  .dark  { background: #1e1e1e; border: 1px solid #333; }

  /* ── SIGNATURE ── */
  .sig { width: 380px; }

  .logo-row     { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .sig-wordmark { font-family: Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: normal; letter-spacing: 0.5px; line-height: 1.1; }
  .sig-sub      { font-family: Arial, Helvetica, sans-serif; font-size: 8px; font-weight: bold; letter-spacing: 3.5px; text-transform: uppercase; margin-top: 3px; }

  .divider { height: 2px; background: #6C63FF; border-radius: 2px; margin-bottom: 14px; }

  .sig-name  { font-family: Georgia, 'Times New Roman', serif; font-size: 17px; font-weight: bold; line-height: 1.2; margin-bottom: 4px; }
  .sig-title { font-family: Arial, Helvetica, sans-serif; font-size: 10px; font-weight: bold; color: #6C63FF; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 14px; }

  .contact-row { display: flex; align-items: center; gap: 10px; margin-bottom: 7px; }
  .contact-row:last-of-type { margin-bottom: 14px; }
  .contact-icon { width: 16px; height: 16px; flex-shrink: 0; }
  .contact-link { font-family: Arial, Helvetica, sans-serif; font-size: 13px; color: #6C63FF; text-decoration: none; }
  .contact-num  { font-family: Arial, Helvetica, sans-serif; font-size: 13px; }

  .footer { font-family: Arial, Helvetica, sans-serif; font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; padding-top: 10px; }

  .light .sig-wordmark { color: #111; }
  .light .sig-sub      { color: #111; }
  .light .sig-name     { color: #111; }
  .light .contact-num  { color: #555; }
  .light .footer       { color: #999; border-top: 1px solid #ddd; }

  .dark .sig-wordmark { color: #fff; }
  .dark .sig-sub      { color: #fff; }
  .dark .sig-name     { color: #fff; }
  .dark .contact-num  { color: #ccc; }
  .dark .footer       { color: #aaa; border-top: 1px solid #444; }
</style>
</head>
