<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syntharra Ops Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='50' width='14' height='40' rx='4' fill='%236C63FF'/><rect x='30' y='35' width='14' height='55' rx='4' fill='%236C63FF'/><rect x='50' y='22' width='14' height='68' rx='4' fill='%236C63FF'/><rect x='70' y='10' width='14' height='80' rx='4' fill='%236C63FF'/></svg>">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --violet: #6C63FF;
      --violet-light: #8B85FF;
      --violet-dim: rgba(108,99,255,0.08);
      --bg: #F0EFF9;
      --surface: #FFFFFF;
      --surface2: #F8F7FF;
      --text-primary: #1A1A2E;
      --text-secondary: #4A4A6A;
      --text-tertiary: #9090A8;
      --border: #E4E2F8;
      --green: #10B981;
      --red: #EF4444;
      --amber: #F59E0B;
      --green-bg: #ECFDF5;
      --red-bg: #FEF2F2;
      --amber-bg: #FFFBEB;
      --green-border: #A7F3D0;
      --red-border: #FECACA;
      --hover-bg: #F5F4FF;
      --subtle-border: #F0EFF9;
    }

    html.dark {
      --bg: #0B0B18;
      --surface: #141422;
      --surface2: #1A1A2C;
      --text-primary: #EDEDFF;
      --text-secondary: #9898BE;
      --text-tertiary: #55557A;
      --border: #22223A;
      --violet-dim: rgba(108,99,255,0.14);
      --green-bg: rgba(16,185,129,0.10);
      --red-bg: rgba(239,68,68,0.10);
      --amber-bg: rgba(245,158,11,0.10);
      --green-border: rgba(16,185,129,0.25);
      --red-border: rgba(239,68,68,0.25);
      --hover-bg: rgba(108,99,255,0.07);
      --subtle-border: rgba(255,255,255,0.04);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      line-height: 1.5;
      overflow-x: clip;
    }

    /* ── HEADER ─────────────────────────── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 var(--border);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo-bars { display: flex; align-items: flex-end; gap: 3px; }
    .logo-bar { border-radius: 2px; background: var(--violet); width: 5px; }
    .logo-bar:nth-child(1) { height: 10px; }
    .logo-bar:nth-child(2) { height: 16px; }
    .logo-bar:nth-child(3) { height: 22px; }
    .logo-bar:nth-child(4) { height: 28px; }
    .header-brand-name { font-size: 17px; font-weight: 800; letter-spacing: -0.02em; color: var(--text-primary); }
    .header-brand-sub { font-size: 10px; color: var(--text-tertiary); margin-top: 1px; }
    .header-divider { width: 1px; height: 26px; background: var(--border); }
    .header-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }

    .header-right { display: flex; align-items: center; gap: 8px; }
    .overall-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 5px;
      border: 1px solid transparent;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }
    .overall-badge.healthy { background: var(--green-bg); color: var(--green); border-color: var(--green-border); }
    .overall-badge.degraded { background: var(--red-bg); color: var(--red); border-color: var(--red-border); }
    .overall-badge.loading { background: var(--surface2); color: var(--text-tertiary); border-color: var(--border); }
    .header-time { font-size: 12px; color: var(--text-tertiary); font-variant-numeric: tabular-nums; }

    .theme-toggle {
      width: 32px; height: 32px;
      border-radius: 7px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-tertiary);
      cursor: pointer;
      font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .theme-toggle:hover { border-color: var(--violet); color: var(--violet); }

    .refresh-btn {
      background: var(--violet);
      color: white;
      border: none;
      padding: 6px 13px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
      font-family: 'Inter', sans-serif;
      display: flex; align-items: center; gap: 5px;
    }
    .refresh-btn:hover { background: var(--violet-light); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── CRITICAL ALERT BANNER ── */
    .alert-banner {
      background: var(--red-bg);
      border-bottom: 2px solid rgba(239,68,68,0.4);
      color: var(--red);
      padding: 8px 28px;
      font-size: 12px;
      font-weight: 600;
      display: none;
      align-items: center;
      gap: 8px;
      position: sticky;
      top: 58px;
      z-index: 90;
    }
    .alert-banner.visible { display: flex; }

    /* ── LAYOUT ─────────────────────────── */
    .container { max-width: 1440px; margin: 0 auto; padding: 18px 24px 48px; }

    /* ── KPI ROW ─────────────────────────── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 11px;
      padding: 14px 16px;
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      opacity: 0;
    }
    .kpi-card.green-top::before { background: var(--green); opacity: 1; }
    .kpi-card.red-top::before { background: var(--red); opacity: 1; }
    .kpi-card.amber-top::before { background: var(--amber); opacity: 1; }
    .kpi-card.violet-top::before { background: var(--violet); opacity: 1; }
    .kpi-label { font-size: 10px; font-weight: 700; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.7px; margin-bottom: 5px; }
    .kpi-value { font-size: 22px; font-weight: 700; color: var(--text-primary); line-height: 1; }
    .kpi-value.green { color: var(--green); }
    .kpi-value.red { color: var(--red); }
    .kpi-value.violet { color: var(--violet); }
    .kpi-sub { font-size: 10px; color: var(--text-tertiary); margin-top: 4px; }

    /* ── MAIN 2-COL GRID ─────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 16px;
      align-items: start;
    }

    /* ── COL HEADERS ─────────────────────── */
    .col-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .col-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      color: var(--text-tertiary);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .col-title::before {
      content: '';
      display: inline-block;
      width: 3px;
      height: 12px;
      background: var(--violet);
      border-radius: 2px;
    }
    .col-meta { font-size: 11px; color: var(--text-tertiary); }

    /* ── SYSTEM CARDS ─────────────────────── */
    .systems-grid { display: flex; flex-direction: column; gap: 8px; }

    .system-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .system-card.unhealthy {
      border-color: rgba(239,68,68,0.3);
      box-shadow: 0 0 0 1px rgba(239,68,68,0.08);
    }
    .system-card-header {
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }
    .system-card-header:hover { background: var(--hover-bg); }
    .system-card.unhealthy .system-card-header { background: rgba(239,68,68,0.03); }
    .system-card.unhealthy .system-card-header:hover { background: rgba(239,68,68,0.07); }

    .system-card-left { display: flex; align-items: center; gap: 8px; }
    .system-name { font-size: 12px; font-weight: 700; color: var(--text-primary); }

    .system-card-right { display: flex; align-items: center; gap: 7px; }
    .system-badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 9px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .system-badge.healthy { background: var(--green-bg); color: var(--green); }
    .system-badge.unhealthy { background: var(--red-bg); color: var(--red); }
    .system-badge.loading { background: var(--surface2); color: var(--text-tertiary); border: 1px solid var(--border); }
    .check-age { font-size: 10px; color: var(--text-tertiary); }
    .expand-chevron {
      font-size: 10px;
      color: var(--text-tertiary);
      transition: transform 0.2s;
      line-height: 1;
    }
    .system-card.collapsed .expand-chevron { transform: rotate(-90deg); }

    .checks-list { border-top: 1px solid var(--subtle-border); }
    .system-card.collapsed .checks-list { display: none; }

    .checks-2col { display: grid; grid-template-columns: 1fr 1fr; }
    .check-item {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      padding: 7px 14px;
      border-bottom: 1px solid var(--subtle-border);
      transition: background 0.1s;
    }
    .check-item:hover { background: var(--hover-bg); }
    .check-item:nth-child(odd) { border-right: 1px solid var(--subtle-border); }
    /* last row — remove bottom border */
    .checks-2col .check-item:last-child,
    .checks-2col .check-item:nth-last-child(2):nth-child(odd) { border-bottom: none; }
    /* single col fallback for odd totals */
    .checks-2col .check-item:last-child:nth-child(odd) { grid-column: span 2; border-right: none; }

    .check-icon { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
    .check-body { flex: 1; min-width: 0; }
    .check-name { font-size: 11px; font-weight: 600; color: var(--text-primary); }
    .check-detail { font-size: 10px; color: var(--text-secondary); margin-top: 1px; word-break: break-word; line-height: 1.4; }

    /* ── STATUS DOT ─────────────────────── */
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.green { background: var(--green); box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }
    .status-dot.red { background: var(--red); box-shadow: 0 0 0 2px rgba(239,68,68,0.2); animation: pulse 1.8s infinite; }
    .status-dot.gray { background: var(--border); }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(239,68,68,0.2); }
      50% { box-shadow: 0 0 0 4px rgba(239,68,68,0.35); }
    }

    /* ── ALERTS SIDEBAR ─────────────────── */
    .alerts-sticky {
      position: sticky;
      top: 76px;
    }
    .alerts-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .alerts-scrollable {
      max-height: calc(100vh - 150px);
      overflow-y: auto;
    }
    .alerts-scrollable::-webkit-scrollbar { width: 3px; }
    .alerts-scrollable::-webkit-scrollbar-track { background: transparent; }
    .alerts-scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .alert-count-badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 9px;
    }
    .alert-count-badge.has-critical { background: var(--red-bg); color: var(--red); }
    .alert-count-badge.has-warning { background: var(--amber-bg); color: var(--amber); }
    .alert-count-badge.none { background: var(--green-bg); color: var(--green); }

    .alert-item {
      padding: 9px 12px 9px 10px;
      border-bottom: 1px solid var(--subtle-border);
      border-left: 3px solid transparent;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .alert-item:last-child { border-bottom: none; }
    .alert-item.critical { border-left-color: var(--red); background: rgba(239,68,68,0.02); }
    .alert-item.warning { border-left-color: var(--amber); background: rgba(245,158,11,0.02); }
    .alert-item.info { border-left-color: var(--violet); }

    .alert-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
    .alert-tier-pill {
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 1px 5px;
      border-radius: 3px;
      flex-shrink: 0;
    }
    .alert-tier-pill.critical { background: var(--red-bg); color: var(--red); }
    .alert-tier-pill.warning { background: var(--amber-bg); color: var(--amber); }
    .alert-tier-pill.info { background: var(--violet-dim); color: var(--violet); }
    .alert-time { font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; }
    .alert-title { font-size: 11px; font-weight: 600; color: var(--text-primary); line-height: 1.3; }
    .alert-message { font-size: 10px; color: var(--text-secondary); line-height: 1.4; }
    .alert-system { font-size: 10px; color: var(--text-tertiary); }
    .no-alerts { padding: 28px 16px; text-align: center; color: var(--text-tertiary); font-size: 12px; }

    /* ── CLIENTS TABLE ──────────────────── */
    .section-gap { margin-top: 16px; }
    .clients-panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .clients-panel-header {
      padding: 11px 16px;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .clients-panel-title { font-size: 12px; font-weight: 700; color: var(--text-primary); }
    .clients-filter-bar { display: flex; gap: 5px; align-items: center; }
    .clients-filter-btn {
      font-size: 10px; font-weight: 600; padding: 3px 9px;
      border-radius: 5px; border: 1px solid var(--border);
      background: transparent; color: var(--text-tertiary);
      cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s;
    }
    .clients-filter-btn.active, .clients-filter-btn:hover { background: var(--violet); color: #fff; border-color: var(--violet); }
    .clients-search {
      font-size: 11px; padding: 4px 9px;
      border: 1px solid var(--border); border-radius: 5px;
      outline: none; color: var(--text-primary);
      font-family: 'Inter', sans-serif; background: var(--surface);
      width: 140px; transition: border-color 0.15s;
    }
    .clients-search:focus { border-color: var(--violet); }
    .clients-table { width: 100%; border-collapse: collapse; }
    .clients-table th {
      font-size: 9px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.7px; color: var(--text-tertiary);
      padding: 8px 16px; text-align: left;
      background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .clients-table td {
      padding: 9px 16px; font-size: 11px;
      border-bottom: 1px solid var(--subtle-border);
      vertical-align: middle;
    }
    .clients-table tr:last-child td { border-bottom: none; }
    .clients-table tr:hover td { background: var(--hover-bg); }
    .client-name-cell { font-weight: 600; color: var(--text-primary); }
    .client-tier-badge {
      font-size: 9px; font-weight: 700; padding: 2px 7px;
      border-radius: 5px; text-transform: uppercase; letter-spacing: 0.3px;
    }
    .client-tier-badge.standard { background: var(--violet-dim); color: var(--violet); }
    .client-check-pill { font-size: 9px; padding: 2px 6px; border-radius: 9px; font-weight: 500; }
    .client-check-pill.ok { background: var(--green-bg); color: var(--green); }
    .client-check-pill.fail { background: var(--red-bg); color: var(--red); }
    .clients-empty { padding: 24px; text-align: center; color: var(--text-tertiary); font-size: 12px; }
    .clients-pagination {
      padding: 9px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-top: 1px solid var(--border);
      font-size: 11px; color: var(--text-tertiary);
    }
    .pagination-btn {
      font-size: 10px; font-weight: 600; padding: 3px 10px;
      border: 1px solid var(--border); border-radius: 5px;
      background: transparent; cursor: pointer; font-family: 'Inter', sans-serif;
      transition: all 0.15s; color: var(--text-secondary);
    }
    .pagination-btn:hover:not(:disabled) { border-color: var(--violet); color: var(--violet); }
    .pagination-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── COUNTDOWN BAR ─────────────────── */
    .countdown-bar {
      height: 2px;
      background: var(--border);
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 200;
    }
    .countdown-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--violet), var(--violet-light));
      transition: width 1s linear;
    }

    /* ── RESPONSIVE ────────────────────── */
    @media (max-width: 1100px) {
      .main-grid { grid-template-columns: 1fr; }
      .alerts-sticky { position: static; }
      .alerts-scrollable { max-height: 360px; }
      .kpi-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .header { padding: 0 14px; height: auto; flex-wrap: wrap; gap: 8px; padding-top: 10px; padding-bottom: 10px; }
      .header-divider, .header-title { display: none; }
      .container { padding: 12px 12px 40px; }
      .kpi-row { grid-template-columns: repeat(2, 1fr); gap: 8px; }
      .checks-2col { grid-template-columns: 1fr; }
      .check-item:nth-child(odd) { border-right: none; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #refreshIcon { display: inline-block; }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo-bars">
        <div class="logo-bar"></div><div class="logo-bar"></div>
        <div class="logo-bar"></div><div class="logo-bar"></div>
      </div>
      <div>
        <div class="header-brand-name">Syntharra</div>
        <div class="header-brand-sub">Global AI Solutions</div>
      </div>
      <div class="header-divider"></div>
      <div class="header-title">Ops Monitor</div>
    </div>
    <div class="header-right">
      <span class="header-time" id="headerTime"></span>
      <div class="overall-badge loading" id="overallBadge">⏳ Loading</div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">
        <span id="themeIcon">☾</span>
      </button>
      <button class="refresh-btn" id="refreshBtn" onclick="refreshAll()">
        <span id="refreshIcon">↻</span> Refresh
      </button>
    </div>
  </div>

  <!-- CRITICAL ALERT BANNER (only shows when criticals exist) -->
  <div class="alert-banner" id="alertBanner">
    ⚠ <span id="alertBannerText"></span>
  </div>

  <div class="container">

    <!-- KPI ROW -->
    <div class="kpi-row" id="kpiRow"></div>

    <!-- MAIN: Systems + Alerts side by side -->
    <div class="main-grid">

      <!-- LEFT: System Health -->
      <div>
        <div class="col-header">
          <span class="col-title">System Health</span>
          <span class="col-meta" id="systemsSummary"></span>
        </div>
        <div class="systems-grid" id="systemsGrid"></div>
      </div>

      <!-- RIGHT: Alerts (sticky) -->
      <div class="alerts-sticky">
        <div class="col-header">
          <span class="col-title">Recent Alerts</span>
          <span class="alert-count-badge none" id="alertCountBadge">0 alerts</span>
        </div>
        <div class="alerts-panel">
          <div class="alerts-scrollable" id="alertsList">
            <div class="no-alerts">Loading...</div>
          </div>
        </div>
      </div>

    </div><!-- /main-grid -->

    <!-- CLIENT TABLE (full width, below) -->
    <div class="section-gap" id="clientsSectionHeader" style="display:none">
      <div class="col-header">
        <span class="col-title">Client Health</span>
        <span class="col-meta" id="clientsTotalBadge"></span>
      </div>
    </div>
    <div class="clients-panel" id="clientsPanel" style="display:none">
      <div class="clients-panel-header">
        <span class="clients-panel-title">All Clients</span>
        <div class="clients-filter-bar">
          <input type="text" class="clients-search" id="clientsSearch" placeholder="Search clients…" oninput="filterClients()">
          <button class="clients-filter-btn active" onclick="setClientFilter('all',this)">All</button>
          <button class="clients-filter-btn" onclick="setClientFilter('standard',this)">Standard</button>
          <button class="clients-filter-btn" onclick="setClientFilter('issues',this)">Issues only</button>
        </div>
      </div>
      <table class="clients-table">
        <thead>
          <tr>
            <th>Client</th><th>Tier</th><th>Checks</th><th>Agent</th>
            <th>Calls (7d)</th><th>Leads (7d)</th><th>Last Check</th>
          </tr>
        </thead>
        <tbody id="clientsTableBody"></tbody>
      </table>
      <div class="clients-pagination" id="clientsPagination" style="display:none">
        <span id="clientsPaginationInfo"></span>
        <div style="display:flex;gap:5px">
          <button class="pagination-btn" id="clientsPrevBtn" onclick="clientsPage(-1)">← Prev</button>
          <button class="pagination-btn" id="clientsNextBtn" onclick="clientsPage(1)">Next →</button>
        </div>
      </div>
    </div>

  </div><!-- /container -->

  <!-- COUNTDOWN BAR -->
  <div class="countdown-bar"><div class="countdown-fill" id="countdownFill" style="width:100%"></div></div>

  <script>
    const API_BASE = window.location.origin;
    const REFRESH_MS = 30000;
    let countdownTimer, countdownRemaining;

    const SYSTEM_ICONS = {
      retell:'📞', n8n:'⚙️', supabase:'🗄️', stripe:'💳',
      jotform:'📋', pipeline:'🔗', crm:'📊',
      infrastructure:'🌐', clients:'👥', revenue:'💰', email:'✉️',
    };
    const SYSTEM_NAMES = {
      retell:'Retell AI', n8n:'n8n Workflows', supabase:'Supabase',
      stripe:'Stripe', jotform:'Jotform', pipeline:'Pipeline (E2E)', crm:'CRM / Calendar',
      infrastructure:'Infrastructure', clients:'Client Health', revenue:'Revenue & Metrics', email:'Email & SMS',
    };
    const SYSTEM_ORDER = ['clients','pipeline','retell','n8n','supabase','stripe','jotform','email','infrastructure','revenue','crm'];

    function timeAgo(iso) {
      if (!iso) return '—';
      const s = (Date.now() - new Date(iso).getTime()) / 1000;
      if (s < 60) return `${Math.round(s)}s ago`;
      if (s < 3600) return `${Math.round(s/60)}m ago`;
      return `${Math.round(s/3600)}h ago`;
    }
    function fmtTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', timeZone:'America/Chicago' });
    }
    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric' });
    }
    function updateClock() {
      document.getElementById('headerTime').textContent =
        new Date().toLocaleTimeString('en-US', { hour:'2-digit', minute:'2-digit', second:'2-digit', timeZone:'America/Chicago' }) + ' CT';
    }

    async function fetchStatus() {
      const [statusRes, alertsRes] = await Promise.all([
        fetch(`${API_BASE}/api/status`),
        fetch(`${API_BASE}/api/alerts?limit=30`),
      ]);
      return { status: await statusRes.json(), alerts: await alertsRes.json() };
    }

    function renderKPIs(status, alerts) {
      const systems = status.systems || {};
      const healthyCount = Object.values(systems).filter(s => s.healthy === true).length;
      const totalCount = Object.keys(systems).length;
      const critAlerts = alerts.filter(a => a.tier === 'critical').length;
      const warnAlerts = alerts.filter(a => a.tier === 'warning').length;
      const rev = systems.revenue?.data || {};
      const retell = systems.retell?.data || {};

      const alertClass = critAlerts > 0 ? 'red-top' : warnAlerts > 0 ? 'amber-top' : 'green-top';
      const alertVal = critAlerts > 0 ? `${critAlerts} crit` : warnAlerts > 0 ? `${warnAlerts} warn` : '0';
      const alertColor = critAlerts > 0 ? 'red' : '';

      document.getElementById('kpiRow').innerHTML = `
        <div class="kpi-card ${healthyCount === totalCount ? 'green-top' : 'red-top'}">
          <div class="kpi-label">Systems Online</div>
          <div class="kpi-value ${healthyCount === totalCount ? 'green' : 'red'}">${healthyCount}<span style="font-size:13px;font-weight:500;color:var(--text-tertiary)">/${totalCount}</span></div>
          <div class="kpi-sub">${healthyCount === totalCount ? 'All healthy' : 'Issues detected'}</div>
        </div>
        <div class="kpi-card ${alertClass}">
          <div class="kpi-label">Active Alerts</div>
          <div class="kpi-value ${alertColor}">${alertVal}</div>
          <div class="kpi-sub">${alerts.length} total in log</div>
        </div>
        <div class="kpi-card violet-top">
          <div class="kpi-label">MRR</div>
          <div class="kpi-value violet">$${(rev.mrr || 0).toLocaleString()}</div>
          <div class="kpi-sub">${rev.activeSubscriptions || 0} active clients <span style="color:var(--amber)">(TEST)</span></div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Calls (24h)</div>
          <div class="kpi-value">${retell.callCount24h || 0}</div>
          <div class="kpi-sub">$${((retell.totalCost24h || 0) / 100).toFixed(2)} cost · ${retell.failRate || 0}% fail</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Signups (30d)</div>
          <div class="kpi-value">${rev.signups30d || 0}</div>
          <div class="kpi-sub">${rev.leads30d || 0} website leads</div>
        </div>
      `;
    }

    // ── Clients state ──
    let allClientsData = [];
    let clientsFilter = 'all';
    let clientsPage_ = 0;
    const CLIENTS_PER_PAGE = 15;

    function renderClients(clientsSystem) {
      if (!clientsSystem?.data?.clients) return;
      allClientsData = clientsSystem.data.clients;
      const panel = document.getElementById('clientsPanel');
      const header = document.getElementById('clientsSectionHeader');
      if (!allClientsData.length) { panel.style.display = 'none'; header.style.display = 'none'; return; }
      panel.style.display = '';
      header.style.display = '';
      document.getElementById('clientsTotalBadge').textContent = `${allClientsData.length} clients`;
      clientsPage_ = 0;
      drawClientsTable();
    }

    function setClientFilter(f, btn) {
      clientsFilter = f;
      clientsPage_ = 0;
      document.querySelectorAll('.clients-filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      drawClientsTable();
    }
    function filterClients() { clientsPage_ = 0; drawClientsTable(); }
    function clientsPage(dir) { clientsPage_ += dir; drawClientsTable(); }

    function drawClientsTable() {
      const search = (document.getElementById('clientsSearch').value || '').toLowerCase();
      let rows = allClientsData.filter(c => {
        if (search && !c.name.toLowerCase().includes(search)) return false;
        if (clientsFilter === 'standard') return c.tier === 'standard';
        if (clientsFilter === 'issues') return !c.healthy;
        return true;
      });

      const total = rows.length;
      const pages = Math.ceil(total / CLIENTS_PER_PAGE);
      if (clientsPage_ >= pages) clientsPage_ = Math.max(0, pages - 1);
      const slice = rows.slice(clientsPage_ * CLIENTS_PER_PAGE, (clientsPage_ + 1) * CLIENTS_PER_PAGE);

      const tbody = document.getElementById('clientsTableBody');
      if (!slice.length) {
        tbody.innerHTML = `<tr><td colspan="7" class="clients-empty">No clients match this filter</td></tr>`;
      } else {
        tbody.innerHTML = slice.map(c => {
          const tierBadge = `<span class="client-tier-badge ${c.tier || 'standard'}">${c.tier || 'std'}</span>`;
          const statusDot = c.healthy ? '🟢' : '🔴';
          const checks = (c.checks || []).map(ck =>
            `<span class="client-check-pill ${ck.ok ? 'ok' : 'fail'}">${ck.check}</span>`
          ).join(' ');
          const agentCheck = (c.checks || []).find(ck => ck.check === 'Agent');
          const callCheck = (c.checks || []).find(ck => ck.check === 'Calls (7d)');
          const callDetail = callCheck?.detail || '';
          const calls7d = (callDetail.match(/(\d+) calls/) || [])[1] || '0';
          const leads7d = (callDetail.match(/(\d+) leads/) || [])[1] || '0';
          return `<tr>
            <td class="client-name-cell">${statusDot} ${c.name}</td>
            <td>${tierBadge}</td>
            <td>${checks || (c.healthy ? '<span class="client-check-pill ok">OK</span>' : '<span class="client-check-pill fail">Issues</span>')}</td>
            <td style="color:var(--text-tertiary)">${agentCheck?.detail || '—'}</td>
            <td>${calls7d}</td>
            <td>${leads7d}</td>
            <td style="color:var(--text-tertiary)">${timeAgo(c.lastCheck || null)}</td>
          </tr>`;
        }).join('');
      }

      const pag = document.getElementById('clientsPagination');
      if (total > CLIENTS_PER_PAGE) {
        pag.style.display = 'flex';
        document.getElementById('clientsPaginationInfo').textContent =
          `${clientsPage_ * CLIENTS_PER_PAGE + 1}–${Math.min((clientsPage_ + 1) * CLIENTS_PER_PAGE, total)} of ${total}`;
        document.getElementById('clientsPrevBtn').disabled = clientsPage_ === 0;
        document.getElementById('clientsNextBtn').disabled = clientsPage_ >= pages - 1;
      } else { pag.style.display = 'none'; }
    }

    function renderSystems(systems) {
      const grid = document.getElementById('systemsGrid');
      grid.innerHTML = '';

      // Build ordered list then sort: failing first, then stable SYSTEM_ORDER
      const keysInOrder = [...SYSTEM_ORDER, ...Object.keys(systems).filter(k => !SYSTEM_ORDER.includes(k))]
        .filter(k => k !== 'clients' && systems[k]);

      keysInOrder.sort((a, b) => {
        const aHealthy = systems[a].healthy === true ? 1 : 0;
        const bHealthy = systems[b].healthy === true ? 1 : 0;
        return aHealthy - bHealthy; // failing (0) before healthy (1)
      });

      const healthyCount = keysInOrder.filter(k => systems[k].healthy === true).length;
      document.getElementById('systemsSummary').textContent = `${healthyCount}/${keysInOrder.length} healthy`;

      for (const key of keysInOrder) {
        const s = systems[key];
        const icon = SYSTEM_ICONS[key] || '📦';
        const name = SYSTEM_NAMES[key] || key;
        const isHealthy = s.healthy === true;
        const dotClass = isHealthy ? 'green' : s.healthy === false ? 'red' : 'gray';
        const badgeClass = isHealthy ? 'healthy' : s.healthy === false ? 'unhealthy' : 'loading';
        const badgeText = isHealthy ? 'Healthy' : s.healthy === false ? 'Issues' : 'Checking';

        const checksHtml = (s.checks || []).map(c => `
          <div class="check-item">
            <span class="check-icon">${c.ok ? '✅' : '❌'}</span>
            <div class="check-body">
              <div class="check-name">${c.name}</div>
              <div class="check-detail">${c.detail || ''}</div>
            </div>
          </div>
        `).join('');

        const card = document.createElement('div');
        // Healthy cards start collapsed; failing cards start open
        card.className = `system-card${isHealthy ? ' collapsed' : ' unhealthy'}`;
        card.innerHTML = `
          <div class="system-card-header" onclick="this.parentElement.classList.toggle('collapsed')">
            <div class="system-card-left">
              <span class="status-dot ${dotClass}"></span>
              <span style="font-size:14px">${icon}</span>
              <span class="system-name">${name}</span>
            </div>
            <div class="system-card-right">
              <span class="system-badge ${badgeClass}">${badgeText}</span>
              <span class="check-age">${timeAgo(s.lastCheck)}</span>
              <span class="expand-chevron">▾</span>
            </div>
          </div>
          <div class="checks-list">
            <div class="checks-2col">${checksHtml || '<div style="padding:10px 14px;color:var(--text-tertiary);font-size:11px;grid-column:span 2">Awaiting first check…</div>'}</div>
          </div>
        `;
        grid.appendChild(card);
      }
    }

    function renderAlerts(alerts) {
      const critCount = alerts.filter(a => a.tier === 'critical').length;
      const warnCount = alerts.filter(a => a.tier === 'warning').length;

      // Badge
      const badge = document.getElementById('alertCountBadge');
      badge.textContent = critCount > 0 ? `${critCount} critical` : warnCount > 0 ? `${warnCount} warnings` : '0 alerts';
      badge.className = `alert-count-badge ${critCount > 0 ? 'has-critical' : warnCount > 0 ? 'has-warning' : 'none'}`;

      // Banner
      const banner = document.getElementById('alertBanner');
      if (critCount > 0) {
        banner.classList.add('visible');
        document.getElementById('alertBannerText').textContent =
          `${critCount} critical alert${critCount > 1 ? 's' : ''} — immediate attention required`;
      } else {
        banner.classList.remove('visible');
      }

      const list = document.getElementById('alertsList');
      if (!alerts.length) {
        list.innerHTML = '<div class="no-alerts">🎉 No alerts — all clear</div>';
        return;
      }
      list.innerHTML = alerts.map(a => `
        <div class="alert-item ${a.tier}">
          <div class="alert-row">
            <span class="alert-tier-pill ${a.tier}">${a.tier}</span>
            <span class="alert-time">${fmtTime(a.timestamp)}</span>
          </div>
          <div class="alert-title">${a.title}</div>
          <div class="alert-message">${a.message}</div>
          <div class="alert-system">${a.system} · ${a.check}${a.suppressed ? ' · cooldown' : ''}</div>
        </div>
      `).join('');
    }

    function renderOverallBadge(healthy) {
      const b = document.getElementById('overallBadge');
      if (healthy === true) { b.className = 'overall-badge healthy'; b.innerHTML = '● All Systems Healthy'; }
      else if (healthy === false) { b.className = 'overall-badge degraded'; b.innerHTML = '● Issues Detected'; }
      else { b.className = 'overall-badge loading'; b.textContent = '⏳ Initializing'; }
    }

    async function loadData() {
      try {
        const { status, alerts } = await fetchStatus();
        renderOverallBadge(status.overallHealthy);
        renderKPIs(status, alerts);
        renderSystems(status.systems || {});
        renderClients(status.systems?.clients);
        renderAlerts(alerts);
      } catch (e) {
        renderOverallBadge(false);
        console.error('Dashboard error:', e);
      }
    }

    async function refreshAll() {
      const btn = document.getElementById('refreshBtn');
      const icon = document.getElementById('refreshIcon');
      btn.disabled = true;
      icon.style.animation = 'spin 0.6s linear infinite';
      try {
        await fetch(`${API_BASE}/api/check/all`, { method: 'POST' });
        await loadData();
      } catch (e) { console.error(e); }
      btn.disabled = false;
      icon.style.animation = '';
      resetCountdown();
    }

    function resetCountdown() {
      clearInterval(countdownTimer);
      countdownRemaining = REFRESH_MS / 1000;
      document.getElementById('countdownFill').style.width = '100%';
      countdownTimer = setInterval(() => {
        countdownRemaining -= 1;
        const pct = (countdownRemaining / (REFRESH_MS / 1000)) * 100;
        document.getElementById('countdownFill').style.width = pct + '%';
        if (countdownRemaining <= 0) { loadData(); resetCountdown(); }
      }, 1000);
    }

    function applyTheme(dark) {
      document.documentElement.classList.toggle('dark', dark);
      document.getElementById('themeIcon').textContent = dark ? '☀' : '☾';
    }
    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle('dark');
      document.getElementById('themeIcon').textContent = isDark ? '☀' : '☾';
      localStorage.setItem('ops-theme', isDark ? 'dark' : 'light');
    }

    function startDashboard() {
      const saved = localStorage.getItem('ops-theme');
      if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        applyTheme(true);
      }
      setInterval(updateClock, 1000);
      updateClock();
      loadData();
      resetCountdown();
    }

    startDashboard();
  </script>
</body>
</html>
